name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest

      - name: Generate corpus (traces are gitignored)
        run: python scripts/generate_corpus.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Interface smoke
        run: python -m aml.backends.interface

      - name: Conformance smoke (1 seed)
        run: |
          pip install click
          grafomem conformance -b aml.backends.gmp_reference:GMPReferenceBackend -s 1

      - name: Corpus verify
        run: grafomem corpus verify

      - name: W10 concurrency runner smoke
        run: python -m aml.eval.concurrency_runner
