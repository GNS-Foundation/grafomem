route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  # Default receiver
  receiver: 'slack-notifications'
  
  routes:
    # High priority alerts (e.g., ErasureSweepFailed, HighAPIErrorRate) go to PagerDuty
    - matchers:
        - severity="critical"
      receiver: 'pagerduty-critical'
      continue: true

    - matchers:
        - pager="true"
      receiver: 'pagerduty-critical'
      continue: true

    # Warnings (e.g., Latency, Workflow errors)
    - matchers:
        - severity="warning"
      receiver: 'slack-notifications'

receivers:
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        send_resolved: true
        description: |-
          {{ .CommonAnnotations.summary }}
          {{ .CommonAnnotations.description }}

  - name: 'slack-notifications'
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: '#grafomem-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
