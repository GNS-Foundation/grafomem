[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "grafomem"
version = "0.1.3"
description = "GRAFOMEM — a research-grade agent-memory benchmark framework"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Camilo Ayerbe Posada" }]
dependencies = [
    "jsonschema>=4",
]

[project.optional-dependencies]
# Embedding/backends extras are added when the backends half lands, e.g.:
#   backends = ["sentence-transformers", "tiktoken", "numpy"]
dev = ["pytest>=8"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
