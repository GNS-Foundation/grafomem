[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "grafomem"
version = "0.1.3"
description = "GRAFOMEM — a research-grade agent-memory benchmark framework"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Camilo Ayerbe Posada" }]
dependencies = [
    "jsonschema>=4",
]

[project.optional-dependencies]
# Reference vector adapter (vector_only): pinned embedding model + exact cosine.
backends = ["sentence-transformers>=2.2", "numpy>=1.24"]
dev = ["pytest>=8"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
